name: CI

# Only trusted, first-party triggers. No workflow_run / issue_comment / PR-target
# flows that would let untrusted event data reach a run step.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: core + offline tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run the test suite
        run: uv run --extra dev pytest -q

      - name: Smoke test the CLI
        run: uv run agentos demo

  api:
    name: REST server tests (py 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run tests with the [api] extra
        run: uv run --extra dev --extra api pytest -q
